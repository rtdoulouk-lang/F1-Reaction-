<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Teste tes réflexes comme un pilote de F1 ! Classement mondial en temps réel.">
<title>F1 Reaction Time</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#121212;--surface2:#181818;--border:#222;--red:#e10600;--green:#00e044;--yellow:#ffd700;--white:#f0f0f0;--muted:#777;--dim:#444}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;touch-action:manipulation}
body{background:var(--bg);color:var(--white);font-family:'Barlow Condensed',sans-serif;overflow-x:hidden;user-select:none;-webkit-user-select:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
input::placeholder{color:#555}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes gridMove{from{transform:translate(0,0)}to{transform:translate(60px,60px)}}
@keyframes lightPulse{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}
@keyframes pulseGo{from{box-shadow:0 0 20px rgba(0,224,68,.1)}to{box-shadow:0 0 50px rgba(0,224,68,.25)}}
.page{display:none;min-height:100vh}.page.active{display:flex;flex-direction:column}
#home{align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
.home-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(225,6,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(225,6,0,.04) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 20s linear infinite}
.home-glow{position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(225,6,0,.12) 0%,transparent 70%);pointer-events:none}
.home-content{position:relative;z-index:1;text-align:center;max-width:500px}
.home-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(2.5rem,10vw,4rem);letter-spacing:4px;line-height:1;animation:fadeUp .8s ease}
.home-logo .f1{color:var(--red)}.home-logo .sub{font-size:.45em;font-weight:400;letter-spacing:8px;color:#888;display:block}
.home-lights{display:flex;gap:12px;justify-content:center;margin:36px 0;animation:fadeUp .8s ease .2s both}
.home-light{width:28px;height:28px;border-radius:50%;background:var(--red);opacity:.8;box-shadow:0 0 15px rgba(225,6,0,.4)}
.home-tagline{font-size:1.1rem;color:#999;letter-spacing:3px;line-height:1.6;margin-bottom:40px;animation:fadeUp .8s ease .4s both}
.home-tagline strong{color:#fff;font-weight:700}
.home-buttons{display:flex;flex-direction:column;gap:12px;animation:fadeUp .8s ease .6s both}
.btn-play{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:18px 40px;background:var(--red);color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 30px rgba(225,6,0,.3);transition:transform .15s}
.btn-play:active{transform:scale(.97)}
.btn-secondary{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:14px 40px;background:transparent;color:#888;border:1px solid #333;border-radius:12px;cursor:pointer}
.home-stats{margin-top:50px;display:flex;gap:30px;justify-content:center;animation:fadeUp .8s ease .8s both}
.home-stat-val{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700}
.home-stat-label{font-size:.6rem;color:#555;letter-spacing:2px;margin-top:4px}
.sound-toggle{position:fixed;top:16px;right:16px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem}
.sound-toggle:active{transform:scale(.9)}
#game{max-width:500px;margin:0 auto;width:100%;padding:0 16px}
.game-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;flex-shrink:0}
.nav-btn{background:none;border:none;color:#666;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:2px;cursor:pointer}
.nav-btn-red{background:var(--red);color:#fff;padding:8px 14px;border-radius:8px;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:2px;cursor:pointer}
.gantry-wrap{display:flex;justify-content:center;padding:12px 0;flex-shrink:0}
.gantry{background:linear-gradient(180deg,#1c1c1c,#141414);border:2px solid #2a2a2a;border-radius:14px;padding:16px 20px;display:flex;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.light-col{display:flex;flex-direction:column;gap:8px}
.light{width:34px;height:34px;border-radius:50%;background:#150808;border:2.5px solid #2a2a2a;transition:all .12s}
.light.red{background:radial-gradient(circle at 40% 35%,#ff3030,#c00500);border-color:#ff2020;box-shadow:0 0 16px #ff2020,0 0 50px rgba(225,6,0,.35),inset 0 -3px 6px rgba(0,0,0,.3),inset 0 2px 3px rgba(255,255,255,.15)}
.light.green{background:radial-gradient(circle at 40% 35%,#20ff60,#00c030);border-color:#00ff44;box-shadow:0 0 16px #00ff55,0 0 50px rgba(0,224,68,.35),inset 0 -3px 6px rgba(0,0,0,.3),inset 0 2px 3px rgba(255,255,255,.15)}
.zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:20px;border:2px solid var(--border);background:var(--surface);cursor:pointer;min-height:220px;margin:8px 0;padding:20px;transition:all .25s}
.zone.waiting{border-color:var(--red);background:linear-gradient(180deg,#1a0808,#100505)}
.zone.go{border-color:var(--green);background:linear-gradient(180deg,#081a0c,#051008);animation:pulseGo .4s ease infinite alternate}
.zone.early{border-color:var(--yellow);background:linear-gradient(180deg,#1a1505,#100d03)}
.zone-title{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(1.1rem,4.5vw,1.5rem);letter-spacing:2px;text-align:center}
.zone-sub{font-size:.8rem;color:#666;letter-spacing:3px;text-transform:uppercase}
.timer-big{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(2.8rem,12vw,4.5rem);line-height:1}
.timer-big.fast{color:var(--green);text-shadow:0 0 40px rgba(0,224,68,.5)}
.timer-big.medium{color:var(--yellow);text-shadow:0 0 40px rgba(255,215,0,.4)}
.timer-big.slow{color:var(--red);text-shadow:0 0 40px rgba(225,6,0,.4)}
.timer-unit{font-size:.3em;color:#777;margin-left:4px}
.rating{font-size:.8rem;font-weight:600;letter-spacing:3px}
.comparison{font-size:.75rem;color:#666;letter-spacing:1px}
.submit-row{margin-top:14px;display:flex;gap:8px;align-items:center;width:100%;max-width:300px}
.submit-input{flex:1;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:1px;outline:none}
.submit-btn{padding:10px 16px;background:var(--red);border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:2px;cursor:pointer;white-space:nowrap}
.submitted-msg{font-size:.8rem;color:var(--green);letter-spacing:2px;margin-top:8px}
.bottom{flex-shrink:0;padding:12px 0 20px}
.history{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:14px;margin-bottom:12px}
.dot{width:10px;height:10px;border-radius:50%;animation:popIn .25s ease}
.dot.fast{background:var(--green);box-shadow:0 0 6px rgba(0,224,68,.5)}.dot.medium{background:var(--yellow);box-shadow:0 0 6px rgba(255,215,0,.5)}.dot.slow{background:var(--red);box-shadow:0 0 6px rgba(225,6,0,.5)}.dot.dnf{background:#555}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{text-align:center;padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.stat-label{font-size:.6rem;color:var(--dim);letter-spacing:3px;margin-bottom:4px}
.stat-value{font-family:'Orbitron',monospace;font-weight:700;font-size:1rem}
#leaderboard{max-width:500px;margin:0 auto;width:100%;padding:0 16px}
.lb-title{font-family:'Orbitron',monospace;font-weight:900;font-size:1.6rem;letter-spacing:3px}
.lb-sub{font-size:.8rem;color:#555;letter-spacing:3px;margin-top:6px}
.lb-empty{text-align:center;padding:60px 20px;color:#555}
.lb-entry{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid #1e1e1e;border-radius:12px;position:relative;overflow:hidden}
.lb-entry.top{background:#141010;border-color:rgba(225,6,0,.25)}
.lb-bar{position:absolute;left:0;top:0;bottom:0;pointer-events:none}
.lb-rank{font-family:'Orbitron',monospace;font-weight:700;width:32px;text-align:center;flex-shrink:0;z-index:1}
.lb-name{flex:1;font-weight:600;font-size:.95rem;letter-spacing:.5px;z-index:1}
.lb-time{font-family:'Orbitron',monospace;font-weight:700;font-size:1rem;z-index:1}
.lb-time-unit{font-size:.6em;color:#555;margin-left:2px}
.flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .08s;z-index:100}
.flash.show{opacity:1}.flash.red-flash{background:rgba(225,6,0,.15)}.flash.green-flash{background:rgba(0,224,68,.12)}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>

<div class="page active" id="home">
  <div class="home-grid"></div><div class="home-glow"></div>
  <div class="home-content">
    <div class="home-logo"><span class="f1">F1</span><br><span class="sub">REACTION TIME</span></div>
    <div class="home-lights">
      <div class="home-light" style="animation:lightPulse 2s ease 0s infinite"></div>
      <div class="home-light" style="animation:lightPulse 2s ease .3s infinite"></div>
      <div class="home-light" style="animation:lightPulse 2s ease .6s infinite"></div>
      <div class="home-light" style="animation:lightPulse 2s ease .9s infinite"></div>
      <div class="home-light" style="animation:lightPulse 2s ease 1.2s infinite"></div>
    </div>
    <p class="home-tagline">TESTE TES RÉFLEXES COMME UN<br><strong>PILOTE DE FORMULE 1</strong></p>
    <div class="home-buttons">
      <button class="btn-play" onclick="goTo('game')">▶ JOUER</button>
      <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 CLASSEMENT</button>
    </div>
    <div class="home-stats">
      <div style="text-align:center"><div class="home-stat-val">~200ms</div><div class="home-stat-label">PILOTE F1</div></div>
      <div style="text-align:center"><div class="home-stat-val">~270ms</div><div class="home-stat-label">HUMAIN MOYEN</div></div>
      <div style="text-align:center"><div class="home-stat-val" style="color:var(--red)">???ms</div><div class="home-stat-label">ET TOI ?</div></div>
    </div>
  </div>
</div>

<div class="page" id="game">
  <div class="game-nav">
    <button class="nav-btn" onclick="goTo('home')">← RETOUR</button>
    <button class="nav-btn-red" onclick="goTo('leaderboard')">🏆 CLASSEMENT</button>
  </div>
  <div class="gantry-wrap"><div class="gantry">
    <div class="light-col"><div class="light" id="L1a"></div><div class="light" id="L1b"></div></div>
    <div class="light-col"><div class="light" id="L2a"></div><div class="light" id="L2b"></div></div>
    <div class="light-col"><div class="light" id="L3a"></div><div class="light" id="L3b"></div></div>
    <div class="light-col"><div class="light" id="L4a"></div><div class="light" id="L4b"></div></div>
    <div class="light-col"><div class="light" id="L5a"></div><div class="light" id="L5b"></div></div>
  </div></div>
  <div class="zone" id="zone" onclick="handleTap()">
    <div class="zone-title">APPUIE POUR COMMENCER</div><div class="zone-sub">teste tes réflexes</div>
  </div>
  <div class="bottom">
    <div class="history" id="history"></div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">MEILLEUR</div><div class="stat-value" id="sBest">—</div></div>
      <div class="stat"><div class="stat-label">MOYENNE</div><div class="stat-value" id="sAvg">—</div></div>
      <div class="stat"><div class="stat-label">ESSAIS</div><div class="stat-value" id="sCount">0</div></div>
    </div>
  </div>
</div>

<div class="page" id="leaderboard">
  <div class="game-nav">
    <button class="nav-btn" onclick="goTo('home')">← ACCUEIL</button>
    <button class="nav-btn-red" onclick="goTo('game')">▶ JOUER</button>
  </div>
  <div style="text-align:center;margin-bottom:30px">
    <div class="lb-title">🏆 CLASSEMENT</div>
    <div class="lb-sub">LES MEILLEURS RÉFLEXES</div>
  </div>
  <div id="lbList"></div>
</div>

<script>
// ═══ SOUND ENGINE ═══
let audioCtx=null,soundOn=true;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext);if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇'}

function playLightBeep(i){
  if(!soundOn)return;const c=getAC(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.type='square';o.frequency.value=820+i*15;
  g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.01,t+.15);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.15);
  const o2=c.createOscillator(),g2=c.createGain();
  o2.type='sine';o2.frequency.value=1200;
  g2.gain.setValueAtTime(.08,t);g2.gain.exponentialRampToValueAtTime(.001,t+.05);
  o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+.05);
}

function playLightsOut(){
  if(!soundOn)return;const c=getAC(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(80,t+.25);
  g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.3);
  const bs=c.sampleRate*.1,buf=c.createBuffer(1,bs,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*.3;
  const n=c.createBufferSource(),ng=c.createGain();n.buffer=buf;
  ng.gain.setValueAtTime(.12,t);ng.gain.exponentialRampToValueAtTime(.001,t+.1);
  n.connect(ng);ng.connect(c.destination);n.start(t);n.stop(t+.1);
}

function playResult(cls){
  if(!soundOn)return;const c=getAC(),t=c.currentTime;
  if(cls==='fast'){
    [523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*.08);g.gain.linearRampToValueAtTime(.12,t+i*.08+.03);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.4);o.connect(g);g.connect(c.destination);o.start(t+i*.08);o.stop(t+i*.08+.4)});
  }else if(cls==='medium'){
    [440,520].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.1,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.2);o.connect(g);g.connect(c.destination);o.start(t+i*.12);o.stop(t+i*.12+.2)});
  }else{
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=150;g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.3);
  }
}

function playFalseStart(){
  if(!soundOn)return;const c=getAC(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=120;
  g.gain.setValueAtTime(.2,t);g.gain.setValueAtTime(.2,t+.1);g.gain.setValueAtTime(0,t+.12);g.gain.setValueAtTime(.2,t+.18);g.gain.exponentialRampToValueAtTime(.001,t+.4);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.4);
  const o2=c.createOscillator(),g2=c.createGain();o2.type='square';o2.frequency.value=280;
  g2.gain.setValueAtTime(.08,t);g2.gain.exponentialRampToValueAtTime(.001,t+.35);
  o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+.35);
}

let engNode=null,engGain=null;
function startEngine(){
  if(!soundOn)return;try{const c=getAC();if(engNode)return;
  engNode=c.createOscillator();engGain=c.createGain();const f=c.createBiquadFilter();
  engNode.type='sawtooth';engNode.frequency.value=85;f.type='lowpass';f.frequency.value=200;engGain.gain.value=.02;
  engNode.connect(f);f.connect(engGain);engGain.connect(c.destination);engNode.start()}catch(e){}}
function stopEngine(){try{if(engGain&&audioCtx){engGain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.3);setTimeout(()=>{try{engNode.stop()}catch(e){}engNode=null;engGain=null},400)}}catch(e){engNode=null;engGain=null}}
function revEngine(){if(!soundOn||!engNode||!engGain||!audioCtx)return;try{const t=audioCtx.currentTime;engNode.frequency.setValueAtTime(85,t);engNode.frequency.linearRampToValueAtTime(300,t+.15);engNode.frequency.linearRampToValueAtTime(150,t+.5);engNode.frequency.linearRampToValueAtTime(85,t+1);engGain.gain.setValueAtTime(.02,t);engGain.gain.linearRampToValueAtTime(.06,t+.15);engGain.gain.linearRampToValueAtTime(.02,t+1)}catch(e){}}

// ═══ NAV ═══
function goTo(p){killTimers();stopEngine();document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');if(p==='leaderboard')renderLB();if(p==='game'){resetUI();startEngine()}window.scrollTo(0,0)}

// ═══ LEADERBOARD ═══
function getBoard(){try{return JSON.parse(localStorage.getItem('f1board')||'[]')}catch{return[]}}
function addScore(n,t){const b=getBoard();b.push({name:n.slice(0,15),time:t,date:new Date().toISOString().slice(0,10)});b.sort((a,c)=>a.time-c.time);const top=b.slice(0,50);localStorage.setItem('f1board',JSON.stringify(top));return top}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderLB(){
  const b=getBoard(),el=document.getElementById('lbList');
  if(!b.length){el.innerHTML='<div class="lb-empty"><div style="font-size:2.5rem;margin-bottom:16px">🏁</div><div style="font-family:Orbitron,monospace;font-size:1rem;letter-spacing:2px;margin-bottom:8px">AUCUN SCORE</div><div style="font-size:.85rem;color:#444;letter-spacing:2px">Sois le premier à jouer !</div></div>';return}
  const mx=Math.max(...b.map(x=>x.time),500),m=['🥇','🥈','🥉'];
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:6px;padding-bottom:40px">'+b.map((e,i)=>{
    const w=Math.max(10,(1-e.time/mx)*100),c=e.time<250?'var(--green)':e.time<350?'var(--yellow)':'var(--red)';
    return`<div class="lb-entry ${i<3?'top':''}" style="animation:fadeSlideIn .3s ease ${i*.04}s both"><div class="lb-bar" style="width:${w}%;background:${i===0?'linear-gradient(90deg,rgba(225,6,0,.1),transparent)':'linear-gradient(90deg,rgba(255,255,255,.02),transparent)'}"></div><div class="lb-rank" style="font-size:${m[i]?'1.2rem':'.8rem'};color:${i<3?'#fff':'#555'}">${m[i]||(i+1)}</div><div class="lb-name" style="color:${i<3?'#fff':'#aaa'}">${esc(e.name)}</div><div class="lb-time" style="color:${c}">${e.time}<span class="lb-time-unit">ms</span></div></div>`}).join('')+'</div>'
}

// ═══ GAME ═══
const cols=[['L1a','L1b'],['L2a','L2b'],['L3a','L3b'],['L4a','L4b'],['L5a','L5b']];
let state='idle',timers=[],goTime=0,results=[];
function vib(ms){try{navigator.vibrate(ms)}catch(e){}}
function clearL(){cols.flat().forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('red','green')})}
function killTimers(){timers.forEach(t=>clearTimeout(t));timers=[]}
function doFlash(c,d){const f=document.getElementById('flash');f.className='flash '+c+'-flash show';setTimeout(()=>f.classList.remove('show'),d)}
function resetUI(){state='idle';clearL();const z=document.getElementById('zone');z.className='zone';z.innerHTML='<div class="zone-title">APPUIE POUR COMMENCER</div><div class="zone-sub">teste tes réflexes</div>'}

function startSeq(){
  state='countdown';clearL();
  const z=document.getElementById('zone');z.className='zone waiting';
  z.innerHTML='<div class="zone-title">ATTENDS...</div><div class="zone-sub">ne touche pas encore</div>';
  for(let i=0;i<5;i++){timers.push(setTimeout(()=>{cols[i].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('red')});playLightBeep(i);vib(30)},1000*(i+1)))}
  const delay=5000+Math.random()*2500+500;
  timers.push(setTimeout(lightsOut,delay));
}

function lightsOut(){
  state='go';clearL();
  cols.flat().forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('red');el.classList.add('green')}});
  goTime=performance.now();
  const z=document.getElementById('zone');z.className='zone go';
  z.innerHTML='<div class="zone-title" style="color:var(--green)">GO !!!</div><div class="zone-sub">appuie maintenant !</div>';
  playLightsOut();revEngine();doFlash('green',150);vib(50);
}

function handleTap(){
  getAC();
  if(state==='idle'||state==='result')startSeq();
  else if(state==='countdown')falseStart();
  else if(state==='go')showResult(performance.now()-goTime);
}

function falseStart(){
  killTimers();clearL();state='result';playFalseStart();doFlash('red',200);vib([100,50,100]);
  const z=document.getElementById('zone');z.className='zone early';
  z.innerHTML='<div class="zone-title" style="color:var(--yellow)">FAUX DÉPART !</div><div class="zone-sub">appuie pour réessayer</div>';
  addDot('dnf');
}

function showResult(ms){
  killTimers();state='result';const t=Math.round(ms);results.push(t);
  let r,cls;
  if(t<200){r='INCROYABLE — NIVEAU F1 !';cls='fast'}
  else if(t<250){r='EXCELLENTE RÉACTION';cls='fast'}
  else if(t<350){r='BON RÉFLEXE';cls='medium'}
  else{r="CONTINUE DE T'ENTRAÎNER";cls='slow'}
  playResult(cls);
  const diff=t-200,comp=diff<=0?Math.abs(diff)+'ms plus rapide qu\'un pilote F1 !':diff+'ms de plus qu\'un pilote F1 (≈200ms)';
  const cv=cls==='fast'?'var(--green)':cls==='medium'?'var(--yellow)':'var(--red)';
  const z=document.getElementById('zone');z.className='zone';
  z.innerHTML=`<div class="timer-big ${cls}">${t}<span class="timer-unit">MS</span></div><div class="rating" style="color:${cv}">${r}</div><div class="comparison">${comp}</div><div class="submit-row" onclick="event.stopPropagation()"><input class="submit-input" type="text" placeholder="Ton pseudo" maxlength="15" id="nameInput" onkeydown="if(event.key==='Enter')submitScore()"><button class="submit-btn" onclick="submitScore()">ENVOYER</button></div><div class="zone-sub" style="margin-top:8px">appuie pour réessayer</div>`;
  addDot(cls);updateStats();setTimeout(clearL,300);vib(cls==='fast'?[50,30,50]:40);
}

function submitScore(){const inp=document.getElementById('nameInput');if(!inp||!inp.value.trim())return;const lr=results[results.length-1];if(!lr)return;addScore(inp.value.trim(),lr);const row=document.querySelector('.submit-row');if(row)row.outerHTML='<div class="submitted-msg">✓ SCORE ENREGISTRÉ !</div>'}
function addDot(c){const d=document.createElement('div');d.className='dot '+c;document.getElementById('history').appendChild(d)}
function updateStats(){const b=Math.min(...results),a=Math.round(results.reduce((x,y)=>x+y,0)/results.length);document.getElementById('sBest').textContent=b+'ms';document.getElementById('sAvg').textContent=a+'ms';document.getElementById('sCount').textContent=results.length}

document.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='Enter')&&document.getElementById('game').classList.contains('active')){if(document.activeElement?.tagName==='INPUT')return;e.preventDefault();handleTap()}});
document.addEventListener('dblclick',e=>e.preventDefault());
</script>
</body>
</html>
